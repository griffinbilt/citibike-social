<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Citibike Social</title>
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" />
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: rgba(12, 12, 12, 0.95);
            --elevated: rgba(255, 255, 255, 0.04);
            --hover: rgba(255, 255, 255, 0.06);
            --text: rgba(255, 255, 255, 0.9);
            --text-2: rgba(255, 255, 255, 0.5);
            --text-3: rgba(255, 255, 255, 0.25);
            --border: rgba(255, 255, 255, 0.06);
            --sidebar: 340px;
            --sheet-peek: 140px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            background: var(--bg); color: var(--text); overflow: hidden;
            -webkit-text-size-adjust: 100%;
        }

        #map { width: 100%; height: 100vh; height: 100dvh; }

        /* ── Sheet handle (mobile) ── */
        .sheet-handle {
            display: none; justify-content: center;
            padding: 12px 0 8px; cursor: pointer; flex-shrink: 0;
            -webkit-tap-highlight-color: transparent; touch-action: manipulation;
        }
        .sheet-handle-bar {
            width: 36px; height: 4px; border-radius: 2px;
            background: rgba(255, 255, 255, 0.25);
        }

        /* ── Sidebar ── */
        .sidebar {
            position: absolute; top: 0; left: 0; z-index: 1000;
            width: var(--sidebar); height: 100vh;
            background: var(--surface);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border-right: 1px solid var(--border);
            display: flex; flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            overflow: hidden;
        }
        .sidebar.collapsed { transform: translateX(calc(-1 * var(--sidebar))); }

        .sidebar-toggle {
            position: absolute; top: 16px; z-index: 1001;
            left: var(--sidebar);
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-2); padding: 8px 10px; cursor: pointer;
            border-radius: 0 8px 8px 0; font-size: 14px;
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            transition: left 0.3s cubic-bezier(0.4, 0, 0.2, 1), color 0.2s;
        }
        .sidebar-toggle:hover { color: var(--text); }
        .sidebar.collapsed + .sidebar-toggle { left: 0; }

        /* ── Header ── */
        .header {
            padding: 20px 20px 16px;
            border-bottom: 1px solid var(--border);
            display: flex; justify-content: space-between; align-items: flex-start;
            flex-shrink: 0;
        }
        .header h1 { font-size: 18px; font-weight: 600; letter-spacing: -0.3px; }
        .header .subtitle { font-size: 12px; color: var(--text-2); margin-top: 2px; }
        .icon-btn {
            width: 30px; height: 30px; border-radius: 7px;
            background: var(--elevated); border: 1px solid var(--border);
            color: var(--text-2); cursor: pointer;
            display: flex; align-items: center; justify-content: center;
            font-size: 14px; transition: all 0.2s; flex-shrink: 0;
            -webkit-tap-highlight-color: transparent;
        }
        .icon-btn:hover { background: var(--hover); color: var(--text); }

        /* ── Auth section ── */
        .auth-section {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .user-info {
            display: flex; align-items: center; gap: 10px;
        }
        .user-avatar {
            width: 32px; height: 32px; border-radius: 50%;
            border: 2px solid rgba(255, 255, 255, 0.1);
        }
        .user-name { font-size: 13px; font-weight: 500; }
        .user-email { font-size: 11px; color: var(--text-3); }
        .sign-in-btn {
            width: 100%; padding: 10px 16px;
            background: #fff; color: #1a1a1a;
            border: none; border-radius: 8px;
            font-size: 13px; font-weight: 600;
            cursor: pointer; display: flex; align-items: center;
            justify-content: center; gap: 8px;
            transition: opacity 0.2s;
        }
        .sign-in-btn:hover { opacity: 0.9; }
        .sign-in-btn svg { width: 18px; height: 18px; }
        .sign-out-link {
            font-size: 11px; color: var(--text-3); cursor: pointer;
            margin-top: 4px; text-decoration: underline;
        }
        .sign-out-link:hover { color: var(--text-2); }

        /* ── Compare section ── */
        .compare-section {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .compare-title {
            font-size: 10px; color: var(--text-3);
            text-transform: uppercase; letter-spacing: 0.8px;
            margin-bottom: 8px;
        }
        .friend-chips {
            display: flex; flex-wrap: wrap; gap: 6px;
        }
        .friend-chip {
            display: flex; align-items: center; gap: 6px;
            padding: 5px 10px 5px 5px;
            background: var(--elevated); border: 1px solid var(--border);
            border-radius: 20px; cursor: pointer;
            transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
            -webkit-tap-highlight-color: transparent;
        }
        .friend-chip:hover { background: var(--hover); }
        .friend-chip.active {
            border-color: var(--chip-color, rgba(255, 255, 255, 0.3));
            background: var(--chip-bg, rgba(255, 255, 255, 0.08));
        }
        .friend-chip img {
            width: 22px; height: 22px; border-radius: 50%;
            border: 2px solid transparent;
            transition: border-color 0.25s;
        }
        .friend-chip.active img {
            border-color: var(--chip-color);
        }
        .friend-chip-name { font-size: 12px; font-weight: 500; }
        .friend-chip-count { font-size: 10px; color: var(--text-3); }
        .friend-chip.active .friend-chip-name { color: #fff; }

        /* ── Scraping progress ── */
        .scrape-section {
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            display: none;
        }
        .scrape-section.visible { display: block; }
        .scrape-label { font-size: 12px; color: var(--text-2); margin-bottom: 6px; }
        .scrape-bar-track {
            width: 100%; height: 4px; background: var(--elevated);
            border-radius: 2px; overflow: hidden;
        }
        .scrape-bar-fill {
            height: 100%; width: 0%;
            background: linear-gradient(90deg, #4ECDC4, #7ED957);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        .scrape-status { font-size: 11px; color: var(--text-3); margin-top: 4px; }

        /* ── Stats ── */
        .stats {
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px;
            padding: 12px 20px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }
        .stat {
            background: var(--elevated); border-radius: 8px;
            padding: 8px 10px; text-align: center;
        }
        .stat-value { font-size: 18px; font-weight: 700; color: #fff; }
        .stat-label {
            font-size: 9px; color: var(--text-3);
            text-transform: uppercase; letter-spacing: 0.8px; margin-top: 1px;
        }

        /* ── Filters ── */
        .filters {
            padding: 10px 20px; border-bottom: 1px solid var(--border);
            flex-shrink: 0; white-space: nowrap; overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        .filters::-webkit-scrollbar { display: none; }
        .filter-btn {
            display: inline-block; padding: 4px 11px; margin: 2px;
            background: var(--elevated); border: 1px solid var(--border);
            border-radius: 14px; color: var(--text-2);
            font-size: 12px; cursor: pointer;
            transition: all 0.2s; font-weight: 500;
            -webkit-tap-highlight-color: transparent;
        }
        .filter-btn:hover {
            background: rgba(74, 0, 224, 0.15);
            border-color: rgba(74, 0, 224, 0.3);
            color: var(--text);
        }
        .filter-btn.active {
            background: linear-gradient(135deg, rgba(230, 50, 20, 0.3), rgba(250, 50, 160, 0.2));
            border-color: rgba(250, 50, 160, 0.4);
            color: #fff;
        }

        /* ── Ride list ── */
        .ride-list {
            flex: 1; overflow-y: auto; position: relative;
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }
        .ride-list::-webkit-scrollbar { width: 4px; }
        .ride-list::-webkit-scrollbar-track { background: transparent; }
        .ride-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.08); border-radius: 2px; }

        .ride-item {
            padding: 8px 16px 8px 13px; cursor: pointer;
            border-left: 3px solid transparent;
            transition: background 0.15s;
            display: flex; flex-direction: column; justify-content: center;
            -webkit-tap-highlight-color: transparent;
        }
        .ride-item:hover { background: var(--hover); }
        .ride-item.active { background: rgba(255, 102, 0, 0.08); }
        .ride-date {
            font-size: 10px; color: var(--text-3);
            margin-bottom: 3px; font-weight: 500; letter-spacing: 0.2px;
        }
        .ride-route { font-size: 12px; line-height: 1.35; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .ride-route .station { color: var(--text); }
        .ride-route .arrow { margin: 0 4px; font-weight: 700; }

        /* ── Compare overlay stats ── */
        .compare-overlay {
            position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
            z-index: 1000; display: none; gap: 8px;
            background: var(--surface);
            backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
            border: 1px solid var(--border); border-radius: 12px;
            padding: 10px 16px;
        }
        .compare-overlay.visible { display: flex; }
        .compare-stat {
            text-align: center; padding: 0 12px;
        }
        .compare-stat + .compare-stat {
            border-left: 1px solid var(--border);
        }
        .compare-stat-name {
            font-size: 11px; font-weight: 600; margin-bottom: 2px;
        }
        .compare-stat-value {
            font-size: 16px; font-weight: 700;
        }
        .compare-stat-label {
            font-size: 9px; color: var(--text-3);
            text-transform: uppercase; letter-spacing: 0.6px;
        }

        /* ── Legend ── */
        .legend {
            position: absolute; bottom: 24px; right: 16px; z-index: 1000;
            background: rgba(10, 10, 10, 0.85);
            padding: 10px 14px; border-radius: 10px;
            border: 1px solid var(--border);
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            transition: opacity 0.3s;
        }
        .legend.hidden { opacity: 0; pointer-events: none; }
        .legend-title {
            font-size: 9px; color: var(--text-3);
            text-transform: uppercase; letter-spacing: 0.8px; margin-bottom: 6px;
        }
        .legend-items { display: flex; flex-direction: column; gap: 4px; }
        .legend-item {
            display: flex; align-items: center; gap: 8px;
        }
        .legend-swatch {
            width: 20px; height: 3px; border-radius: 2px;
        }
        .legend-label {
            font-size: 10px; color: var(--text-2);
        }

        /* ── Map controls ── */
        .map-ctrls {
            position: absolute; top: 96px; right: 10px; z-index: 1000;
            display: flex; flex-direction: column; gap: 4px;
        }
        .map-btn {
            width: 30px; height: 30px; border-radius: 4px;
            background: rgba(10, 10, 10, 0.85);
            border: 1px solid var(--border); color: var(--text-2);
            cursor: pointer; font-size: 11px; font-weight: 600;
            display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px);
            transition: all 0.2s; -webkit-tap-highlight-color: transparent;
        }
        .map-btn:hover { color: var(--text); background: rgba(20,20,20,0.9); }

        /* ── MapLibre overrides ── */
        .maplibregl-ctrl-group {
            background: rgba(10, 10, 10, 0.85) !important;
            border: 1px solid var(--border) !important;
            border-radius: 4px !important; box-shadow: none !important;
        }
        .maplibregl-ctrl-group button { width: 30px !important; height: 30px !important; }
        .maplibregl-ctrl-group button + button { border-top: 1px solid var(--border) !important; }
        .maplibregl-ctrl-group button .maplibregl-ctrl-icon { filter: invert(1) opacity(0.5); }
        .maplibregl-ctrl-group button:hover .maplibregl-ctrl-icon { filter: invert(1) opacity(0.8); }
        .maplibregl-ctrl-attrib { background: rgba(0,0,0,0.5) !important; }
        .maplibregl-ctrl-attrib, .maplibregl-ctrl-attrib a {
            color: rgba(255,255,255,0.3) !important; font-size: 10px !important;
        }

        /* ── Mobile ── */
        @media (max-width: 768px) {
            :root { --sheet-peek: 160px; }
            .sidebar {
                top: auto; bottom: 0; left: 0; right: 0;
                width: 100%; height: 85dvh;
                border-right: none; border-top: 1px solid var(--border);
                border-radius: 16px 16px 0 0;
                transform: translateY(calc(100% - var(--sheet-peek)));
                box-shadow: 0 -4px 24px rgba(0, 0, 0, 0.5);
            }
            .sidebar.collapsed { transform: translateY(calc(100% - var(--sheet-peek))); }
            .sidebar.expanded { transform: translateY(0); }
            .sidebar-toggle { display: none; }
            .sheet-handle { display: flex; padding: 10px 0 6px; min-height: 28px; }
            .header { padding: 2px 16px 8px; }
            .header h1 { font-size: 15px; }
            .header .subtitle { display: none; }
            .stats { padding: 6px 16px; gap: 4px; }
            .stat { padding: 4px 4px; }
            .stat-value { font-size: 14px; }
            .stat-label { font-size: 7px; }
            .filters { padding: 6px 16px; }
            .auth-section, .compare-section { padding: 8px 16px; }
            .ride-list { padding-bottom: env(safe-area-inset-bottom, 0px); }
            .legend { bottom: calc(var(--sheet-peek) + 10px); right: 10px; opacity: 0.5; }
            .map-ctrls { top: max(10px, env(safe-area-inset-top, 0px)); right: auto; left: 10px; }
            .maplibregl-ctrl-top-right {
                top: max(10px, env(safe-area-inset-top, 0px)) !important;
                right: 10px !important;
            }
            .compare-overlay {
                top: auto; bottom: calc(var(--sheet-peek) + 10px);
                left: 10px; right: 10px; transform: none;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sheet-handle" id="sheet-handle"><div class="sheet-handle-bar"></div></div>

        <div class="header">
            <div>
                <h1>Citibike Social</h1>
                <div class="subtitle">Ride together, compare routes</div>
            </div>
            <button class="icon-btn" onclick="closeSidebar()" title="Close">&times;</button>
        </div>

        <!-- Auth -->
        <div class="auth-section" id="auth-section">
            <div id="auth-signed-out">
                <button class="sign-in-btn" id="sign-in-btn" onclick="signIn()">
                    <svg viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
                    Sign in with Google
                </button>
            </div>
            <div id="auth-signed-in" style="display:none">
                <div class="user-info">
                    <img class="user-avatar" id="user-avatar" src="" alt="">
                    <div>
                        <div class="user-name" id="user-name"></div>
                        <div class="user-email" id="user-email"></div>
                    </div>
                </div>
                <div class="sign-out-link" onclick="signOut()">Sign out</div>
            </div>
        </div>

        <!-- Scraping progress -->
        <div class="scrape-section" id="scrape-section">
            <div class="scrape-label">Importing your rides...</div>
            <div class="scrape-bar-track"><div class="scrape-bar-fill" id="scrape-bar"></div></div>
            <div class="scrape-status" id="scrape-status">Searching Gmail for receipts...</div>
        </div>

        <!-- Compare -->
        <div class="compare-section" id="compare-section" style="display:none">
            <div class="compare-title">Compare rides</div>
            <div class="friend-chips" id="friend-chips"></div>
        </div>

        <div class="stats" id="stats"></div>
        <div class="filters"><div id="year-filters"></div></div>
        <div class="ride-list" id="ride-list"></div>
    </div>
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()">&#9776;</button>

    <div id="map"></div>

    <div class="compare-overlay" id="compare-overlay"></div>

    <div class="map-ctrls">
        <button class="map-btn" id="anim-toggle" onclick="toggleAnimation()" title="Toggle animation">
            <svg width="10" height="12" viewBox="0 0 10 12"><rect x="0" y="0" width="3" height="12" fill="currentColor"/><rect x="7" y="0" width="3" height="12" fill="currentColor"/></svg>
        </button>
        <button class="map-btn" onclick="resetView()" title="Reset view">&#x21BA;</button>
    </div>

    <div class="legend" id="legend"></div>

    <script src="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.js"></script>
    <script src="https://unpkg.com/deck.gl@9/dist.min.js"></script>
    <script src="https://unpkg.com/@mapbox/polyline@1.2.1/src/polyline.js"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="https://apis.google.com/js/api.js" async defer></script>
    <script src="app.js"></script>
</body>
</html>
